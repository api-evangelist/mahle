description: FOCUS-aligned FinOps placeholder for MAHLE. As a Tier 1 automotive supplier, no public
  billing-model details, meters, or invoice schema are published. This artifact records the absence so consumers
  know to source commercial terms from the provider directly.
notes: MAHLE does not publish a public developer pricing page. Commercial terms for any integrations
  are negotiated directly; invoices are issued under contract terms rather than a metered self-serve API.
